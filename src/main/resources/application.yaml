spring:
  application:
    name: szlx23-api

  # 数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/szlx23_website
    username: postgres
    password: 001023
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  # JPA/Hibernate 配置
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true